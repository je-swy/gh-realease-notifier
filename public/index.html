<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Release Notifier</title>
  <link href="style.css" rel="stylesheet" />
</head>

<body>
  <div class="card">
    <h1>GitHub Release Notifier</h1>
    <p>Subscribe to email notifications for new releases of any GitHub repository</p>

    <label>Email address</label>
    <input type="email" id="email" placeholder="your@gmail.com" />

    <label>GitHub repository</label>
    <input type="text" id="repo" placeholder="microsoft/vscode" />

    <button id="btn" onclick="subscribe()">Subscribe</button>
    <div class="message" id="message"></div>
  </div>

  <script src="script.js"></script>
</body>

</html>
